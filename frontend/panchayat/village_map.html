<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Map - BlueCarbon Ledger</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0d9488',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #village-map {
            height: calc(100vh - 180px);
            /* Fill most of the screen */
            width: 100%;
            border-radius: 12px;
            z-index: 10;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            padding: 4px;
        }

        .custom-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 24px;
            height: 24px;
        }
    </style>
</head>

<body class="bg-gray-50 flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 hidden md:flex flex-col h-full relative z-20">
        <div class="p-6 flex items-center mb-6">
            <i data-lucide="leaf" class="h-6 w-6 text-teal-500 mr-2"></i>
            <span class="font-bold text-lg text-gray-900">BlueCarbon Ledger</span>
        </div>
        <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
            <a href="/api/panchayat/dashboard"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl font-medium transition-colors">
                <i data-lucide="clipboard-check" class="w-5 h-5 mr-3"></i> Verification Queue
            </a>
            <a href="/api/panchayat/village-map"
                class="flex items-center px-4 py-3 bg-teal-50 text-teal-700 rounded-xl font-medium transition-colors">
                <i data-lucide="map" class="w-5 h-5 mr-3"></i> Village Map
            </a>
            <a href="/api/panchayat/local-farmers"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl font-medium transition-colors">
                <i data-lucide="users" class="w-5 h-5 mr-3"></i> Local Farmers
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200">
            <a href="/api/login"
                class="flex items-center px-4 py-3 text-red-600 hover:bg-red-50 rounded-xl font-medium transition-colors">
                <i data-lucide="log-out" class="w-5 h-5 mr-3"></i> Sign Out
            </a>
        </div>
    </aside>

    <!-- Mobile Header -->
    <div
        class="md:hidden fixed top-0 w-full bg-white border-b border-gray-200 z-30 flex items-center justify-between p-4">
        <div class="flex items-center">
            <i data-lucide="leaf" class="h-6 w-6 text-teal-500 mr-2"></i>
            <span class="font-bold text-lg text-gray-900">BlueCarbon</span>
        </div>
        <button id="mobile-menu-toggle" class="text-gray-600 focus:outline-none">
            <i data-lucide="menu" class="h-6 w-6"></i>
        </button>
    </div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden mt-16 md:mt-0 relative z-10 w-full">
        <!-- Topbar -->
        <header
            class="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between shadow-sm hidden md:flex">
            <div>
                <h1 class="text-xl font-bold text-gray-900">Village Infrastructure Map</h1>
                <p class="text-sm text-gray-500">View geolocation of all enrolled mangrove projects</p>
            </div>
            <div class="flex items-center space-x-4">
                <button type="button" onclick="speakHelp()"
                    class="flex items-center px-3 py-1.5 bg-teal-50 text-teal-700 rounded-lg text-sm font-semibold hover:bg-teal-100 transition-colors mr-2">
                    <i data-lucide="volume-2" class="w-4 h-4 mr-2"></i> Voice Help
                </button>
                <div class="h-8 w-8 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center font-bold">
                    GP
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="flex-1 p-4 md:p-6 overflow-hidden flex flex-col">
            <!-- Legend & Controls -->
            <div
                class="flex flex-wrap items-center justify-between mb-4 gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <div class="flex flex-wrap items-center gap-4 text-sm font-medium" id="map-filters">
                    <button
                        class="filter-btn active flex items-center px-3 py-1.5 rounded-lg bg-gray-100 hover:bg-gray-200 transition-colors"
                        data-status="ALL">
                        <i data-lucide="layers" class="w-4 h-4 mr-2 text-gray-600"></i> All Projects
                    </button>
                    <button
                        class="filter-btn flex items-center px-3 py-1.5 rounded-lg hover:bg-gray-50 transition-colors"
                        data-status="FULLY_VERIFIED">
                        <span class="w-3 h-3 rounded-full bg-green-500 mr-2 inline-block"></span> Verified
                    </button>
                    <button
                        class="filter-btn flex items-center px-3 py-1.5 rounded-lg hover:bg-gray-50 transition-colors"
                        data-status="PENDING_PANCHAYAT">
                        <span class="w-3 h-3 rounded-full bg-yellow-400 mr-2 inline-block"></span> Pending Verification
                    </button>
                    <button
                        class="filter-btn flex items-center px-3 py-1.5 rounded-lg hover:bg-gray-50 transition-colors"
                        data-status="REJECTED">
                        <span class="w-3 h-3 rounded-full bg-red-500 mr-2 inline-block"></span> Rejected
                    </button>
                </div>
                <!-- Total stats or filter can go here -->
                <div class="text-gray-600 text-sm font-semibold">
                    Showing: <span id="visible-count" class="bg-teal-50 text-teal-700 px-2 py-1 rounded">{{
                        projects|length }}</span>
                </div>
            </div>

            <!-- Map Container -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-2 flex-1 relative">
                <div id="village-map"></div>
            </div>
        </div>
    </main>

    <!-- Mobile Slide-out Menu backdrop -->
    <div id="mobile-sidebar-backdrop" class="fixed inset-0 bg-gray-900/50 z-40 hidden md:hidden"></div>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        lucide.createIcons();
        document.addEventListener('DOMContentLoaded', function () {
            // Mobile Menu
            const mobileMenuToggle = document.getElementById('mobile-menu-toggle');
            const sidebar = document.querySelector('aside');
            const backdrop = document.getElementById('mobile-sidebar-backdrop');

            if (mobileMenuToggle) {
                mobileMenuToggle.addEventListener('click', () => {
                    sidebar.classList.toggle('hidden');
                    sidebar.classList.toggle('absolute');
                    sidebar.classList.toggle('left-0');
                    sidebar.classList.toggle('top-0');
                    sidebar.classList.toggle('h-full');
                    sidebar.classList.toggle('z-50');
                    backdrop.classList.toggle('hidden');
                });

                backdrop.addEventListener('click', () => {
                    sidebar.classList.add('hidden');
                    sidebar.classList.remove('absolute', 'left-0', 'top-0', 'h-full', 'z-50');
                    backdrop.classList.add('hidden');
                });
            }

            // Map Initialization
            const map = L.map('village-map').setView([21.82, 88.88], 11);

            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri'
            }).addTo(map);

            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Esri Boundaries/Places'
            }).addTo(map);

            // Project Data Injection from Django
            const projectsData = [
                {% for project in projects %}
                {
                id: "{{ project.id }}",
                name: "{{ project.project_name }}",
                farmer: "{{ project.farmer.name }}",
                status: "{{ project.status }}",
                area: "{{ project.plantation_area }}",
                coords: "{{ project.description }}"
            }{% if not forloop.last %}, {% endif %}
        {% endfor %}
            ];

        const bounds = [];
        let allMarkers = []; // Store markers for filtering

        projectsData.forEach(p => {
            if (p.coords && p.coords.includes(',')) {
                const parts = p.coords.split(',');
                const lat = parseFloat(parts[0]);
                const lng = parseFloat(parts[1]);

                if (!isNaN(lat) && !isNaN(lng)) {
                    bounds.push([lat, lng]);

                    // Determine Marker Color
                    let colorHex = '#eab308'; // Default Yellow (Pending/Partial)
                    if (p.status === 'FULLY_VERIFIED') {
                        colorHex = '#22c55e'; // Green
                    } else if (p.status === 'REJECTED') {
                        colorHex = '#ef4444'; // Red
                    }

                    // Create Custom Icon
                    const markerHtml = `<div class="custom-marker" style="background-color: ${colorHex};"></div>`;
                    const customIcon = L.divIcon({
                        className: '', // Clear default leaflet class
                        html: markerHtml,
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    });

                    // Prepare Popup HTML unconditionally linking to review page
                    let actionBtn = `<a href="/api/panchayat/project-review/${p.id}" class="block w-full text-center mt-3 bg-teal-600 text-white py-1.5 rounded text-xs font-bold hover:bg-teal-700">Project Details</a>`;

                    const popupContent = `
                            <div class="p-2 min-w-[200px]">
                                <h4 class="font-bold text-gray-900 border-b pb-1 mb-2">${p.name}</h4>
                                <div class="space-y-1 text-sm">
                                    <p><span class="text-gray-500 font-medium">Farmer:</span> ${p.farmer}</p>
                                    <p><span class="text-gray-500 font-medium">Area:</span> ${p.area} Ha</p>
                                    <p><span class="text-gray-500 font-medium">Status:</span> <span class="uppercase text-[10px] font-bold tracking-wide">${p.status.replace('_', ' ')}</span></p>
                                </div>
                                ${actionBtn}
                            </div>
                        `;

                    const marker = L.marker([lat, lng], { icon: customIcon })
                        .bindPopup(popupContent);

                    marker.pStatus = p.status; // Attach status to marker for filtering
                    marker.pLat = lat;
                    marker.pLng = lng;

                    allMarkers.push(marker);
                    marker.addTo(map);
                }
            }
        });

        // Adjust map view to fit all markers if any exist
        if (bounds.length > 0) {
            map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
        }

        // Filtering Logic
        const filterBtns = document.querySelectorAll('.filter-btn');
        const visibleCountSpan = document.getElementById('visible-count');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Update active styling
                filterBtns.forEach(b => {
                    b.classList.remove('active', 'bg-gray-100');
                    b.classList.add('hover:bg-gray-50');
                });
                btn.classList.add('active', 'bg-gray-100');
                btn.classList.remove('hover:bg-gray-50');

                const targetStatus = btn.getAttribute('data-status');
                let visibleCount = 0;
                const newBounds = [];

                allMarkers.forEach(marker => {
                    // Check if it matches the filter
                    if (targetStatus === 'ALL' || marker.pStatus === targetStatus ||
                        (targetStatus === 'PENDING_PANCHAYAT' && marker.pStatus === 'PARTIALLY_VERIFIED')) {

                        if (!map.hasLayer(marker)) {
                            marker.addTo(map);
                        }
                        visibleCount++;
                        newBounds.push([marker.pLat, marker.pLng]);
                    } else {
                        if (map.hasLayer(marker)) {
                            map.removeLayer(marker);
                        }
                    }
                });

                visibleCountSpan.innerText = visibleCount;

                // Re-center map based on visible pins
                if (newBounds.length > 0) {
                    map.fitBounds(newBounds, { padding: [50, 50], maxZoom: 15 });
                }
            });
        });
        });

        // Voice Help
        function speakHelp() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let lang = localStorage.getItem('farmer_lang') || 'en';
                let text = "This is the village map. It shows all the projects submitted in the region. Green pins are verified projects, yellow are pending, and red are rejected.";

                if (lang === 'hi') {
                    text = "यह गांव का नक्शा है। यह क्षेत्र में जमा की गई सभी परियोजनाओं को दर्शाता है। हरे पिन सत्यापित प्रोजेक्ट हैं, पीले लंबित हैं, और लाल अस्वीकृत हैं।";
                } else if (lang === 'te') {
                    text = "ఇది గ్రామ మ్యాప్. ఇది ఈ ప్రాంతంలో సమర్పించిన అన్ని ప్రాజెక్టులను చూపుతుంది. ఆకుపచ్చ పిన్‌లు ధృవీకరించబడిన ప్రాజెక్టులు, పసుపు పెండింగ్‌లో ఉన్నాయి మరియు ఎరుపు తిరస్కరించబడ్డాయి.";
                }

                let msg = new SpeechSynthesisUtterance(text);
                if (lang === 'hi') msg.lang = 'hi-IN';
                else if (lang === 'te') msg.lang = 'te-IN';
                else msg.lang = 'en-US';

                window.speechSynthesis.speak(msg);
            }
        }
    </script>
</body>

</html>
