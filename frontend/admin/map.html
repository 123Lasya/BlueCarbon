<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Map View - BlueCarbon Ledger</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        .leaflet-popup-content-wrapper {
            padding: 0;
            rounded: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            border: 1px solid #e2e8f0;
        }

        .leaflet-popup-content {
            margin: 0;
            width: 280px !important;
        }

        .marker-icon-custom {
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 900: '#14532d' },
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 800: '#1e293b', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .glass-dark {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>

</head>

<body class="bg-surface-50 flex h-screen overflow-hidden ">

        <!-- Sidebar -->
    <aside class="w-64 glass-dark text-white hidden md:flex flex-col relative z-20">
        <div class="p-8 border-b border-white/10 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center shadow-lg shadow-brand-500/20">
                <i data-lucide="leaf" class="w-5 h-5 text-white"></i>
            </div>
            <div>
                <span class="font-bold text-lg tracking-tight leading-none block">GovAdmin</span>
                <span class="text-xs text-slate-400 font-medium tracking-wider uppercase">Portal</span>
            </div>
        </div>
        <nav class="flex-1 px-4 space-y-1.5 mt-6 relative z-10">
            <a href="/api/admin/dashboard" class="flex items-center gap-3 px-4 py-3.5 hover:bg-white/5 rounded-2xl text-slate-300 font-medium transition-all group">
                <i data-lucide="layout-dashboard" class="w-5 h-5 group-hover:text-white transition-colors"></i> Overview & Map
            </a>
            <a href="/api/admin/credit-requests" class="flex items-center gap-3 px-4 py-3.5 hover:bg-white/5 rounded-2xl text-slate-300 font-medium transition-all group">
                <i data-lucide="file-text" class="w-5 h-5 group-hover:text-white transition-colors"></i> Credit Requests
            </a>
            <a href="/api/admin/analytics" class="flex items-center gap-3 px-4 py-3.5 hover:bg-white/5 rounded-2xl text-slate-300 font-medium transition-all group">
                <i data-lucide="bar-chart-2" class="w-5 h-5 group-hover:text-white transition-colors"></i> Analytics
            </a>
            <a href="/api/admin/map" class="flex items-center gap-3 px-4 py-3.5 bg-brand-500/10 rounded-2xl text-brand-400 font-semibold transition-all group">
                <i data-lucide="map" class="w-5 h-5  transition-colors"></i> National Map View
            </a>
        </nav>

        <!-- User Profile Area -->
        <div class="p-6 border-t border-white/10">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-slate-800 border-2 border-slate-700 flex items-center justify-center text-sm font-bold text-slate-300">
                        AD
                    </div>
                    <div>
                        <p class="text-sm font-bold text-white leading-tight">Admin User</p>
                        <p class="text-xs text-slate-400">Government Node</p>
                    </div>
                </div>
                <a href="/api/login" class="text-slate-400 hover:text-red-400 transition-colors p-2 rounded-lg hover:bg-white/5" title="Sign Out">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </a>
            </div>
        </div>
    </aside>

    <!-- Main Map Container -->
    <main class="flex-1 relative h-full w-full">

        <!-- Filter Overlay Panel -->
        <div class="absolute top-6 left-6 z-[1000] bg-white rounded-2xl shadow-lg border border-gray-200 p-5 w-80">
            <h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
                <i data-lucide="layers" class="w-5 h-5 text-teal-600"></i> Map Layers Filter
            </h2>

            <div class="space-y-3">
                <label
                    class="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors group">
                    <input type="checkbox" id="filter-approved" checked
                        class="w-5 h-5 rounded border-gray-300 text-teal-600 focus:ring-teal-600"
                        onchange="applyFilters()">
                    <div class="flex items-center gap-2 flex-1">
                        <span class="w-3 h-3 rounded-full bg-emerald-500 ring-2 ring-emerald-500 ring-offset-2"></span>
                        <span class="text-sm font-medium text-gray-700 group-hover:text-gray-900">Approved
                            Projects</span>
                    </div>
                </label>

                <label
                    class="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors group">
                    <input type="checkbox" id="filter-pending" checked
                        class="w-5 h-5 rounded border-gray-300 text-teal-600 focus:ring-teal-600"
                        onchange="applyFilters()">
                    <div class="flex items-center gap-2 flex-1">
                        <span class="w-3 h-3 rounded-full bg-amber-400 ring-2 ring-amber-400 ring-offset-2"></span>
                        <span class="text-sm font-medium text-gray-700 group-hover:text-gray-900">Pending
                            Approvals</span>
                    </div>
                </label>

                <label
                    class="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors group">
                    <input type="checkbox" id="filter-rejected" checked
                        class="w-5 h-5 rounded border-gray-300 text-teal-600 focus:ring-teal-600"
                        onchange="applyFilters()">
                    <div class="flex items-center gap-2 flex-1">
                        <span class="w-3 h-3 rounded-full bg-red-500 ring-2 ring-red-500 ring-offset-2"></span>
                        <span class="text-sm font-medium text-gray-700 group-hover:text-gray-900">Rejected
                            Projects</span>
                    </div>
                </label>

                <div class="h-px bg-gray-200 my-2"></div>

                <label
                    class="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors group">
                    <input type="checkbox" id="filter-company" checked
                        class="w-5 h-5 rounded border-gray-300 text-teal-600 focus:ring-teal-600"
                        onchange="applyFilters()">
                    <div class="flex items-center gap-2 flex-1">
                        <span class="w-3 h-3 rounded-full bg-blue-500 ring-2 ring-blue-500 ring-offset-2"></span>
                        <span class="text-sm font-medium text-gray-700 group-hover:text-gray-900">Company Credit
                            Requests</span>
                    </div>
                </label>
            </div>
        </div>

        <!-- Details Dashboard Overlay -->
        <div
            class="absolute bottom-6 left-6 z-[1000] bg-white rounded-xl shadow-lg border border-gray-200 p-4 flex gap-6">
            <div>
                <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1">Carbon Tracking</p>
                <p class="text-lg font-bold text-gray-900"><span id="total-viz-creds">0</span> <span
                        class="text-sm text-gray-500 font-medium">tCO₂e</span></p>
            </div>
            <div class="w-px bg-gray-200"></div>
            <div>
                <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1">Active Pointers</p>
                <p class="text-lg font-bold text-gray-900"><span id="total-viz-nodes">0</span> <span
                        class="text-sm text-gray-500 font-medium">nodes</span></p>
            </div>
        </div>

        <div id="map" class="h-full w-full z-10"></div>
    </main>

    <script>
        lucide.createIcons();

        // Init Map
        const map = L.map('map', { zoomControl: false }).setView([20.5937, 78.9629], 5);
        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        let allMarkers = [];
        let mapData = [];

        function getMarkerConfig(item) {
            if (item.type === 'request') {
                return { color: '#3b82f6', category: 'company' };
            }

            if (item.status === 'FULLY_VERIFIED') return { color: '#10b981', category: 'approved' };
            if (item.status === 'REJECTED') return { color: '#ef4444', category: 'rejected' };
            return { color: '#fbbf24', category: 'pending' };
        }

        function createCustomIcon(color) {
            return L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="marker-icon-custom" style="background-color: ${color}; width: 14px; height: 14px; transform: translate(-50%, -50%);"></div>`,
                iconSize: [0, 0],
                iconAnchor: [0, 0]
            });
        }

        function generatePopupContent(item, confColor) {
            if (item.type === 'request') {
                return `
                    <div class="bg-blue-600 px-4 py-3 text-white">
                        <p class="text-[10px] uppercase font-bold tracking-widest opacity-80 mb-1">Company Request</p>
                        <h3 class="font-bold text-base leading-tight">${item.name}</h3>
                    </div>
                    <div class="p-4 bg-white">
                        <div class="flex justify-between items-center mb-2 pb-2 border-b border-gray-100">
                            <span class="text-gray-500 text-xs font-medium">Status</span>
                            <span class="text-blue-700 font-bold text-xs uppercase bg-blue-50 px-2 py-1 rounded">${item.status}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-gray-500 text-xs font-medium">Credits Requested</span>
                            <span class="text-gray-900 font-bold text-sm">${item.credits} tCO₂e</span>
                        </div>
                    </div>
                `;
            }

            // Project Popup
            return `
                <div class="px-4 py-3 text-white" style="background-color: ${confColor}">
                    <p class="text-[10px] uppercase font-bold tracking-widest opacity-80 mb-1">Carbon Project</p>
                    <h3 class="font-bold text-base leading-tight mb-1 truncate" title="${item.name}">${item.name}</h3>
                    <p class="text-xs opacity-90"><i data-lucide="user" class="w-3 h-3 inline mr-1"></i>${item.farmer}</p>
                </div>
                <div class="p-4 bg-white">
                    <div class="flex justify-between items-center mb-2 pb-2 border-b border-gray-100">
                        <span class="text-gray-500 text-xs font-medium">Status</span>
                        <span class="font-bold text-xs uppercase" style="color: ${confColor}">${item.status.replace(/_/g, ' ')}</span>
                    </div>
                    <div class="flex justify-between items-center mb-2 pb-2 border-b border-gray-100">
                        <span class="text-gray-500 text-xs font-medium">Total Area</span>
                        <span class="text-gray-900 font-bold text-sm">${item.area} ha</span>
                    </div>
                    
                    <div class="mt-3 flex items-center justify-between bg-gray-50 rounded p-2 border border-gray-100">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-white text-xs ${item.ai_score >= 85 ? 'bg-green-500' : (item.ai_score >= 60 ? 'bg-yellow-500' : 'bg-red-500')}">
                                ${item.ai_score}%
                            </div>
                            <span class="text-xs font-medium text-gray-700 leading-tight">AI Confidence<br>Score</span>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-gray-500 uppercase font-semibold">Gen Credits</p>
                            <p class="text-teal-600 font-bold">${item.credits}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function loadMapData() {
            fetch('/api/projects/map')
                .then(res => res.json())
                .then(data => {
                    mapData = data;
                    applyFilters();
                });
        }

        function applyFilters() {
            // Remove all existing markers
            allMarkers.forEach(m => map.removeLayer(m));
            allMarkers = [];

            const showApproved = document.getElementById('filter-approved').checked;
            const showPending = document.getElementById('filter-pending').checked;
            const showRejected = document.getElementById('filter-rejected').checked;
            const showCompany = document.getElementById('filter-company').checked;

            let totalNodes = 0;
            let totalCredits = 0;

            mapData.forEach(item => {
                const conf = getMarkerConfig(item);

                // Check filter visibility
                if (!showApproved && conf.category === 'approved') return;
                if (!showPending && conf.category === 'pending') return;
                if (!showRejected && conf.category === 'rejected') return;
                if (!showCompany && conf.category === 'company') return;

                totalNodes++;
                totalCredits += parseFloat(item.credits || 0);

                const marker = L.marker([item.lat, item.lng], {
                    icon: createCustomIcon(conf.color)
                });

                marker.bindPopup(generatePopupContent(item, conf.color));
                marker.addTo(map);
                allMarkers.push(marker);
            });

            document.getElementById('total-viz-nodes').innerText = totalNodes;
            document.getElementById('total-viz-creds').innerText = Math.round(totalCredits).toLocaleString();

            // Re-render lucide icons inside popups asynchronously
            map.on('popupopen', function () {
                lucide.createIcons();
            });
        }

        loadMapData();
    </script>
</body>

</html>
